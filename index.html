<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRC — Security Trainer (Ahmed Abu Jami Edition)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff; --bg2:#f5f5f3; --bg3:#eeede9;
    --text:#1a1a1a; --text2:#555551; --text3:#88887f;
    --border:#e0dfd8; --red:#c0392b; --blue:#1a5276; 
    --green:#1e6b3a; --amber:#7d5a0a; --radius:10px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg3); color:var(--text); padding:16px}
  .app{max-width:820px; margin:0 auto}
  .card{background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:15px}
  .title{font-size:20px; font-weight:700; margin-bottom:5px}
  .stats-bar{display:flex; gap:10px; margin-bottom:18px}
  .stat-item{background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:12px; flex:1; text-align:center}
  .btn{cursor:pointer; font-family:inherit; font-size:13px; padding:8px 16px; border-radius:6px; border:1px solid var(--border); transition:0.2s}
  .btn-primary{background:var(--red); color:#fff; border-color:var(--red)}
  .btn-blue{background:#eaf2fb; color:var(--blue); border-color:var(--blue)}
  .practice-area{width:100%; min-height:110px; padding:12px; margin:12px 0; border:1.5px solid #eaf2fb; border-radius:6px; resize:vertical; outline:none}
  .ans-box{display:none; background:#f9f9f9; padding:15px; border-radius:6px; margin-top:12px; border-left:4px solid var(--green)}
  .score-badge{font-size:11px; font-weight:700; padding:4px 8px; border-radius:4px; text-transform:uppercase; margin-left:10px}
  .correct{background:#eafaf1; color:var(--green)}
  .partial{background:#fef9ec; color:var(--amber)}
  .wrong{background:#fdf0ef; color:var(--red)}
  .keyword-tag{display:inline-block; font-size:11px; background:#eee; padding:2px 6px; border-radius:4px; margin:2px}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="title">IRC Access & Security — Ahmed's Trainer</div>
    <div style="font-size:13px; color:var(--text3)">Auto-grading based on HEAT Protocols & ACF Experience</div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div id="s-graded" style="font-size:24px; font-weight:700">0</div><div style="font-size:12px; color:var(--text3)">Answered</div></div>
    <div class="stat-item"><div id="s-score" style="font-size:24px; font-weight:700">—</div><div style="font-size:12px; color:var(--text3)">Avg Score</div></div>
  </div>

  <div id="qList"></div>
</div>

<script>
const QUESTIONS = [
  {
    id: 1,
    cat: "General",
    q: "Can you tell us about yourself and your background?",
    a: "I am Ahmed Abu Jami, a Security Assistant at ACF. I specialize in automation, using VBA Macros and Python to convert movement data into KML files. I built M-Tracker to aggregate real-time news and Telegram feeds for Gaza.",
    keywords: ["acf", "heat", "uxo", "trauma", "vba", "macro", "kml", "m-tracker", "automation", "geocoding"]
  },
  {
    id: 2,
    cat: "Crisis",
    q: "If you lose communication with a field team during an escalation, what is your protocol?",
    a: "First, stay calm. Check the Master Tracker for last known coordinates. Reach out to community focal points. Brief the Security Manager and activate the Contingency Plan (SHRER) to hibernate or evacuate.",
    keywords: ["calm", "master tracker", "coordinates", "focal points", "brief", "shrer", "hibernate", "evacuate"]
  },
  {
    id: 3,
    cat: "Personal",
    q: "Describe a time you had to make a quick decision under pressure.",
    a: "During an assessment near the Yellow Line in Khan Younis with Sam, fire shooting started. I ordered us to take shelter behind ruins, calmed Sam down, and guided us back to the vehicle while notifying the Area Manager.",
    keywords: ["yellow line", "khan younis", "shooting", "shelter", "ruins", "calmed", "notifying"]
  },
  {
    id: 4,
    cat: "Field",
    q: "How do you prioritize tasks using your matrix?",
    a: "Priority 1: Life-Safety (SOS/Evacuation). Priority 2: Operational Readiness (Deconfliction/HNS/KML). Priority 3: System Integrity (Tracker updates). Priority 4: Admin.",
    keywords: ["life-safety", "deconfliction", "hns", "kml", "master tracker", "matrix"]
  },
  {
    id: 5,
    cat: "Crisis",
    q: "What is your response to a staff injury in the field?",
    a: "Secure the scene (double-tap risk). Provide Buddy-Aid (tourniquet). Broadcast ATMIST alert to the SFP. Evacuate to a stabilization point immediately.",
    keywords: ["double-tap", "buddy-aid", "tourniquet", "atmist", "sfp", "stabilization"]
  },
  {
    id: 6,
    cat: "Access",
    q: "What are the 4 P's of incident response priority?",
    a: "1. People (health/safety), 2. Property (assets), 3. Reputation (org image), 4. Programme continuation. People always come first.",
    keywords: ["people", "property", "reputation", "programme"]
  }
];

let results = {};

function checkAnswer(id) {
  const q = QUESTIONS.find(x => x.id === id);
  const userText = document.getElementById(`text-${id}`).value.toLowerCase();
  
  if (userText.length < 15) {
    alert("Please write a more detailed answer to receive a score.");
    return;
  }

  // Auto-Score Engine
  let matchCount = 0;
  let foundKeywords = [];
  q.keywords.forEach(word => {
    if (userText.includes(word.toLowerCase())) {
      matchCount++;
      foundKeywords.push(word);
    }
  });

  const scorePct = (matchCount / q.keywords.length) * 100;
  let grade = "wrong";
  let feedback = "Needs work. Try to use more technical terms from your HEAT training.";

  if (scorePct >= 60) {
    grade = "correct";
    feedback = "Excellent! You used strong technical terminology and hit key points.";
  } else if (scorePct >= 25) {
    grade = "partial";
    feedback = "Good, but you missed some critical technical terms (see below).";
  }

  results[id] = { result: grade, feedback: feedback, matches: foundKeywords };
  updateStats();
  renderList();
  document.getElementById(`ans-${id}`).style.display = 'block';
}

function renderList() {
  const list = document.getElementById('qList');
  list.innerHTML = '';
  QUESTIONS.forEach(q => {
    const res = results[q.id];
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div style="font-weight:700; color:var(--red); font-size:12px; margin-bottom:5px">#${q.id} - ${q.cat}</div>
      <div style="font-weight:600; margin-bottom:10px">${q.q}</div>
      <textarea class="practice-area" id="text-${q.id}" placeholder="Draft your response here..." ${res ? 'disabled' : ''}>${res ? 'Submitted' : ''}</textarea>
      
      <div style="display:flex; gap:10px; align-items:center">
        ${res ? '' : `<button class="btn btn-primary" onclick="checkAnswer(${q.id})">🤖 Auto-Check Answer</button>`}
        <button class="btn btn-blue" onclick="toggleAns(${q.id})">View Model Answer</button>
        ${res ? `<span class="score-badge ${res.result}">${res.result}</span>` : ''}
      </div>

      <div class="ans-box" id="ans-${q.id}" style="${res ? 'display:block' : 'display:none'}">
        ${res ? `<p style="font-size:13px; color:var(--blue); font-style:italic; margin-bottom:10px">${res.feedback}</p>` : ''}
        <p><strong>Model Answer:</strong> ${q.a}</p>
        <div style="margin-top:10px">
          <strong>Key Technical Terms:</strong><br>
          ${q.keywords.map(k => `<span class="keyword-tag" style="${res && res.matches.includes(k) ? 'background:#eafaf1; color:var(--green)' : ''}">${k}</span>`).join('')}
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

function toggleAns(id) {
  const box = document.getElementById('ans-'+id);
  box.style.display = (box.style.display === 'block') ? 'none' : 'block';
}

function updateStats() {
  const graded = Object.keys(results).length;
  const correct = Object.values(results).filter(v => v.result === 'correct').length;
  const partial = Object.values(results).filter(v => v.result === 'partial').length;
  const score = graded > 0 ? Math.round(((correct + (partial * 0.5)) / graded) * 100) : 0;
  
  document.getElementById('s-graded').textContent = graded;
  document.getElementById('s-score').textContent = graded > 0 ? score + '%' : '—';
}

renderList();
</script>
</body>
</html>
