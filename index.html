<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRC Security Trainer — Ahmed Abu Jami</title>
    <style>
        /* Modernized Styles for Khan Younis Environment */
        *{box-sizing:border-box; margin:0; padding:0}
        :root{
            --bg:#ffffff; --bg-alt:#f5f5f3; --text:#1a1a1a; 
            --red:#c0392b; --blue:#1a5276; --green:#1e6b3a; 
            --border:#e0dfd8; --radius:12px;
        }
        body{font-family:-apple-system, sans-serif; background:#eeede9; padding:20px; color:var(--text)}
        .app{max-width:850px; margin:0 auto}
        .header-card{background:var(--bg); padding:25px; border-radius:var(--radius); border:1px solid var(--border); margin-bottom:20px}
        .q-card{background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:15px; transition:0.2s}
        .q-card:hover{box-shadow:0 4px 15px rgba(0,0,0,0.05)}
        .stats-grid{display:flex; gap:15px; margin-bottom:20px}
        .stat-box{background:var(--bg); flex:1; padding:15px; border-radius:var(--radius); text-align:center; border:1px solid var(--border)}
        .btn{cursor:pointer; padding:10px 20px; border-radius:8px; border:1px solid var(--border); font-weight:600; font-size:13px; transition:0.2s}
        .btn-check{background:var(--red); color:white; border-color:var(--red)}
        .btn-view{background:var(--blue); color:white; border-color:var(--blue); margin-left:10px}
        .practice-input{width:100%; min-height:120px; padding:15px; margin:15px 0; border:1.5px solid #d1d5db; border-radius:8px; font-family:inherit; font-size:14px; resize:vertical}
        .practice-input:focus{border-color:var(--blue); outline:none}
        .ans-box{display:none; background:var(--bg-alt); padding:20px; border-radius:8px; margin-top:15px; border-left:5px solid var(--green)}
        .badge{font-size:11px; font-weight:800; padding:4px 10px; border-radius:4px; text-transform:uppercase; margin-left:10px}
        .correct{background:#eafaf1; color:var(--green)}
        .partial{background:#fef9ec; color:#7d5a0a}
        .incorrect{background:#fdf0ef; color:var(--red)}
        .keyword-chip{display:inline-block; font-size:12px; background:#e2e8f0; padding:3px 8px; border-radius:4px; margin:2px}
    </style>
</head>
<body>

<div class="app">
    <div class="header-card">
        <h1 style="font-size:22px">IRC Security & Access Trainer</h1>
        <p style="color:#666; font-size:14px; margin-top:5px">Personalized for Ahmed Abu Jami | ACF Gaza Experience</p>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><div id="s-count" style="font-size:24px; font-weight:700">0</div><div style="font-size:12px; color:#666">Answered</div></div>
        <div class="stat-box"><div id="s-score" style="font-size:24px; font-weight:700">—</div><div style="font-size:12px; color:#666">Avg Score</div></div>
    </div>

    <div id="qList"></div>
</div>

<script>
/* 
   DATA SOURCE:[cite: 2] - "HEAT IRC interview.docx" 
   Personal Stories: Ahmed's specific ACF experience & Sam (Khan Younis) incident.
*/
const QUESTIONS = [
    {
        id: 1,
        cat: "General",
        q: "Can you tell us about yourself and your background?",
        a: "I am Ahmed Abu Jami, specializing in field security and data automation. At ACF, I reduced manual mapping from 90 mins to 10 mins using VBA Macros/KML. I also built M-Tracker for real-time incident dashboards.",
        keywords: ["acf", "vba", "macro", "kml", "m-tracker", "automation", "mapping", "safety"]
    },
    {
        id: 2,
        cat: "Personal",
        q: "Describe a time you had to make a quick decision under pressure.",
        a: "During an assessment near the Yellow Line in Khan Younis with Sam, shooting started. I ordered shelter behind ruins, calmed Sam down, and guided us back to the vehicle while notifying the Area Manager.",
        keywords: ["yellow line", "khan younis", "shooting", "shelter", "ruins", "calm", "vehicle", "notifying"]
  },
    {
        id: 3,
        cat: "Field",
        q: "How do you prioritize tasks?",
        a: "Priority 1: Life-Safety (SOS). Priority 2: Operational Readiness (HNS/KML). Priority 3: System Integrity (Tracker updates). Priority 4: Admin.",
        keywords: ["life-safety", "deconfliction", "hns", "kml", "matrix", "prioritize"]
    },
    {
        id: 4,
        cat: "Crisis",
        q: "If a team loses communication during escalation, what is your protocol?",
        a: "Stay calm. Check last known coordinates on Master Tracker. Reach community focal points. Brief Manager. Activate SHRER protocols (Hibernate/Evacuate).",
        keywords: ["calm", "master tracker", "coordinates", "focal points", "shrer", "hibernate"]
    }
];

let results = {};

function checkAnswer(id) {
    const q = QUESTIONS.find(x => x.id === id);
    const userText = document.getElementById(`text-${id}`).value.toLowerCase();
    
    if (userText.length < 15) {
        alert("Please write a detailed response to get an accurate auto-score.");
        return;
    }

    // Auto-Grade Engine based on Keywords from[cite: 2]
    let matches = 0;
    let found = [];
    q.keywords.forEach(word => {
        if (userText.includes(word.toLowerCase())) {
            matches++;
            found.push(word);
        }
    });

    const scorePct = (matches / q.keywords.length) * 100;
    let grade = "incorrect";
    let feedback = "Review the model answer. You need to use more technical terms like '" + q.keywords[0] + "'.";

    if (scorePct >= 65) {
        grade = "correct";
        feedback = "Excellent! You hit all key technical terms required for the role.";
    } else if (scorePct >= 30) {
        grade = "partial";
        feedback = "Good start, but you missed some critical operational keywords.";
    }

    results[id] = { grade, feedback, found };
    updateStats();
    renderList();
    document.getElementById(`ans-${id}`).style.display = 'block';
}

function renderList() {
    const list = document.getElementById('qList');
    list.innerHTML = '';
    QUESTIONS.forEach(q => {
        const res = results[q.id];
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                <span style="font-size:12px; font-weight:700; color:var(--red)">#${q.id} - ${q.cat}</span>
                ${res ? `<span class="badge ${res.grade}">${res.grade}</span>` : ''}
            </div>
            <div style="font-weight:600; margin-bottom:15px">${q.q}</div>
            
            <textarea class="practice-input" id="text-${q.id}" placeholder="Type your practice response here..." ${res ? 'disabled' : ''}></textarea>
            
            <div style="display:flex; align-items:center">
                ${!res ? `<button class="btn btn-check" onclick="checkAnswer(${q.id})">🤖 Auto-Check Answer</button>` : ''}
                <button class="btn btn-view" onclick="toggleAns(${q.id})">View Model Ans</button>
            </div>

            <div class="ans-box" id="ans-${q.id}" style="${res ? 'display:block' : ''}">
                <p style="color:var(--blue); font-size:13px; font-style:italic; margin-bottom:10px">${res ? res.feedback : ''}</p>
                <p><strong>Model Answer:</strong> ${q.a}</p>
                <div style="margin-top:10px">
                    <strong>Required Keywords:</strong><br>
                    ${q.keywords.map(k => `<span class="keyword-chip" style="${res && res.found.includes(k) ? 'background:#eafaf1; color:var(--green)' : ''}">${k}</span>`).join('')}
                </div>
            </div>
        `;
        list.appendChild(div);
    });
}

function toggleAns(id) {
    const box = document.getElementById('ans-'+id);
    box.style.display = (box.style.display === 'block') ? 'none' : 'block';
}

function updateStats() {
    const graded = Object.keys(results).length;
    const correct = Object.values(results).filter(r => r.grade === 'correct').length;
    const partial = Object.values(results).filter(r => r.grade === 'partial').length;
    const score = graded > 0 ? Math.round(((correct + (partial * 0.5)) / graded) * 100) : 0;
    
    document.getElementById('s-count').textContent = graded;
    document.getElementById('s-score').textContent = graded > 0 ? score + '%' : '—';
}

renderList();
</script>
</body>
</html>
